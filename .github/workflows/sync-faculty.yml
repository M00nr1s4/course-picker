name: Sync BNBU Faculty

on:
  schedule:
    # 每天北京时间 14:00 (UTC 6:00) 自动同步一次
    - cron: "0 6 * * *"
  # 也可以在 GitHub 仓库页面手动触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Sync faculty from BNBU
        run: npx tsx scripts/sync-faculty.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
